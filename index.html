<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menu Principal - Ajedrez</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2c3e50; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: white;
        }
        h1 { margin-bottom: 40px; font-weight: 300; }
        .menu-container { display: flex; gap: 30px; }
        
        .btn { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 250px; 
            height: 250px; 
            background: white; 
            color: #333; 
            text-decoration: none; 
            border-radius: 20px; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-size: 18px;
            font-weight: bold;
        }
        
        .btn:hover { 
            transform: translateY(-10px); 
            background-color: #ecf0f1; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }
        
        .icon { font-size: 80px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Bienvenido, al Juego de Ajedrez con Apuntes</h1>

    <div class="menu-container">
        <a href="ajedrez" class="btn">
            <span class="icon">♞</span>
            Juego de Ajedrez
        </a>

        <a href="Misapuntes/jguardadas.html" class="btn">
            <span class="icon">📁</span>
            Jugadas Guardadas
        </a>

        <a href="apuntes/" class="btn">
            <span class="icon">📝</span>
            Apuntes de Ajedrez
        </a>
    </div>

</body>
</html>
